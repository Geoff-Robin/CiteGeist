<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CiteGeist{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        .tab {
            display: none;
        }
        .tab.active {
            display: block;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="flex items-center justify-between p-4 bg-white bg-opacity-80 backdrop-filter backdrop-blur-sm">
        <div class="flex items-center">
            <!-- SVG Logo -->
            <svg width="60" height="60" viewBox="0 0 48 48">
                <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                    <path d="M18 23.937V10a6 6 0 0 1 12 0v2.006m0 11.997V38a6 6 0 0 1-12 0v-2.03"></path>
                    <path d="M24 30H9.984C6.68 30 4 27.314 4 24s2.68-6 5.984-6h2.005M24 18h13.989A6.006 6.006 0 0 1 44 24c0 3.314-2.691 6-6.011 6h-1.923"></path>
                </g>
            </svg>
            <span class="ml-2 text-2xl font-bold">CiteGeist</span>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center p-4">
        {% block content %}
        {% endblock %}
    </main>
    <script>
        const modal = document.getElementById("authModal");
        const closeBtn = document.getElementsByClassName("close")[0];

        function openModal(tab) {
            modal.style.display = "block";
            openTab(event, tab);
        }

        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tab-button");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" bg-blue-500 text-white", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " bg-blue-500 text-white";
        }
    </script>
</body>
</html>
