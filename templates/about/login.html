{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Login - CiteGeist</title>
    <meta property="og:title" content="Login - CiteGeist" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <meta property="twitter:card" content="summary_large_image" />

    <style data-tag="reset-style-sheet">
      html {  line-height: 1.15;}body {  margin: 0;}* {  box-sizing: border-box;  border-width: 0;  border-style: solid;}p,li,ul,pre,div,h1,h2,h3,h4,h5,h6,figure,blockquote,figcaption {  margin: 0;  padding: 0;}button {  background-color: transparent;}button,input,optgroup,select,textarea {  font-family: inherit;  font-size: 100%;  line-height: 1.15;  margin: 0;}button,select {  text-transform: none;}button,[type="button"],[type="reset"],[type="submit"] {  -webkit-appearance: button;}button::-moz-focus-inner,[type="button"]::-moz-focus-inner,[type="reset"]::-moz-focus-inner,[type="submit"]::-moz-focus-inner {  border-style: none;  padding: 0;}button:-moz-focus,[type="button"]:-moz-focus,[type="reset"]:-moz-focus,[type="submit"]:-moz-focus {  outline: 1px dotted ButtonText;}a {  color: inherit;  text-decoration: inherit;}input {  padding: 2px 4px;}img {  display: block;}html { scroll-behavior: smooth  }
    </style>
    <style data-tag="default-style-sheet">
      html {
        font-family: Inter;
        font-size: 16px;
      }

      body {
        font-weight: 400;
        font-style:normal;
        text-decoration: none;
        text-transform: none;
        letter-spacing: normal;
        line-height: 1.15;
        color: var(--dl-color-theme-neutral-dark);
        background: var(--dl-color-theme-neutral-light);

        fill: var(--dl-color-theme-neutral-dark);
      }
    </style>
    <link
      rel="stylesheet"
      href="https://unpkg.com/animate.css@4.1.1/animate.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@teleporthq/teleport-custom-scripts/dist/style.css"
    />
  </head>
  <body>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    <div>
      <link href="{% static 'login.css' %}" rel="stylesheet" />

      <div class="login-container">
        <sign-in3-wrapper
          class="sign-in3-wrapper"
          rootclassname="sign-in3undefined"
        >
          <!--SignIn3 component-->
          <div
            class="sign-in3-container1 thq-section-padding sign-in3root-class-name"
          >
            <div
              class="sign-in3-max-width thq-section-max-width thq-section-padding"
            >
              <svg width="60" height="60" viewBox="0 0 48 48">
                <g
                  fill="none"
                  stroke="currentColor"
                  stroke-width="4"
                  stroke-linecap="round"
                >
                  <path
                    d="M18 23.937V10a6 6 0 0 1 12 0v2.006m0 11.997V38a6 6 0 0 1-12 0v-2.03"
                  ></path>
                  <path
                    d="M24 30H9.984C6.68 30 4 27.314 4 24s2.68-6 5.984-6h2.005M24 18h13.989A6.006 6.006 0 0 1 44 24c0 3.314-2.691 6-6.011 6h-1.923"
                  ></path>
                </g>
              </svg>
              <div class="sign-in3-form-root">
                <div class="sign-in3-form1">
                  <h2>
                    <fragment class="login-fragment3">
                      <span class="login-text3 thq-heading-2">
                        Welcome back!
                      </span>
                    </fragment>
                  </h2>
                  <form class="sign-in3-form2" action="{% url 'login' %}" method="post">
                    {% csrf_token %}
                    <div class="sign-in3-email">
                      <label
                        for="thq-sign-in-1-password"
                        class="sign-in3-text2 thq-body-large"
                      >
                        Username
                      </label>
                      <input
                        type="text"
                        id="thq-sign-in-3-email"
                        required="true"
                        placeholder="Username"
                        name="username"
                        class="sign-in3-textinput1 thq-body-large thq-input"
                      />
                    </div>
                    <div class="sign-in3-password">
                      <div class="sign-in3-container2">
                        <label
                          for="thq-sign-in-3-password"
                          class="sign-in3-text3 thq-body-large"
                        >
                          Password
                        </label>
                        <div class="sign-in3-hide-password">
                          <svg viewBox="0 0 1024 1024" class="sign-in3-icon5">
                            <path
                              d="M317.143 762.857l44.571-80.571c-66.286-48-105.714-125.143-105.714-206.857 0-45.143 12-89.714 34.857-128.571-89.143 45.714-163.429 117.714-217.714 201.714 59.429 92 143.429 169.143 244 214.286zM539.429 329.143c0-14.857-12.571-27.429-27.429-27.429-95.429 0-173.714 78.286-173.714 173.714 0 14.857 12.571 27.429 27.429 27.429s27.429-12.571 27.429-27.429c0-65.714 53.714-118.857 118.857-118.857 14.857 0 27.429-12.571 27.429-27.429zM746.857 220c0 1.143 0 4-0.571 5.143-120.571 215.429-240 432-360.571 647.429l-28 50.857c-3.429 5.714-9.714 9.143-16 9.143-10.286 0-64.571-33.143-76.571-40-5.714-3.429-9.143-9.143-9.143-16 0-9.143 19.429-40 25.143-49.714-110.857-50.286-204-136-269.714-238.857-7.429-11.429-11.429-25.143-11.429-39.429 0-13.714 4-28 11.429-39.429 113.143-173.714 289.714-289.714 500.571-289.714 34.286 0 69.143 3.429 102.857 9.714l30.857-55.429c3.429-5.714 9.143-9.143 16-9.143 10.286 0 64 33.143 76 40 5.714 3.429 9.143 9.143 9.143 15.429zM768 475.429c0 106.286-65.714 201.143-164.571 238.857l160-286.857c2.857 16 4.571 32 4.571 48zM1024 548.571c0 14.857-4 26.857-11.429 39.429-17.714 29.143-40 57.143-62.286 82.857-112 128.571-266.286 206.857-438.286 206.857l42.286-75.429c166.286-14.286 307.429-115.429 396.571-253.714-42.286-65.714-96.571-123.429-161.143-168l36-64c70.857 47.429 142.286 118.857 186.857 192.571 7.429 12.571 11.429 24.571 11.429 39.429z"
                            ></path>
                          </svg>
                          <span class="thq-body-small">Hide</span>
                        </div>
                      </div>
                      <input
                        type="password"
                        id="thq-sign-in-3-password"
                        required="true"
                        name="password"
                        placeholder="Password"
                        class="sign-in3-textinput2 thq-body-large thq-input"
                      />
                      <a
                        href="https://teleporthq.io/"
                        target="_blank"
                        rel="noreferrer noopener"
                        class="sign-in3-link thq-body-small"
                      >
                        Forgot password
                      </a>
                    </div>
                    <div class="sign-in3-container3">
                      <button
                        type="submit"
                        class="sign-in3-button1 thq-button-filled"
                      >
                        <span>
                          <fragment class="login-fragment1">
                            <span class="login-text1 thq-body-small">Login</span>
                          </fragment>
                        </span>
                      </button>
                    </div>
                  </form>
                </div>
              </div>
              <div class="sign-in3-container4">
                <div class="sign-in3-divider1">
                  <div class="sign-in3-divider2"></div>
                  <div class="sign-in3-divider3"></div>
                </div>
                <button
                  type="button"
                  class="sign-in3-button2 thq-button-outline"
                >
                </button>
              </div>
            </div>
            <img
              alt="TeleportHQ Sign In"
              src="https://play.teleporthq.io/static/svg/default-img.svg"
              class="sign-in3-sign-up-image thq-img-ratio-16-9"
            />
            <div class="sign-in3-container5"></div>
          </div>
        </sign-in3-wrapper>
      </div>
    </div>
    <script
      defer=""
      src="https://unpkg.com/@teleporthq/react-components/dist/animate-on-reveal.umd.js"
    ></script>
    <script
      defer=""
      src="https://unpkg.com/@teleporthq/teleport-custom-scripts"
    ></script>
  </body>
</html>
